<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clicker</title>

<style>
body {
    background: #22C1C3;
    background: linear-gradient(0deg, rgba(34,193,195,1) 0%, rgba(240,104,242,1) 52%, rgba(253,187,45,1) 100%);
}
html, body {
    height: 100%;
    margin: 0;
}

#clicker{
    width: 200px;
    height: 200px;
    border-radius: 200px;
    background-color: #111;
    border: 2px solid #ccc;
    box-shadow: 0 0 10px #000;
    cursor: pointer;
}
#clicker:active{
    background-color: #333;
}
.contenedor {
    margin-top: -1%;
    margin-left: 30%;
    font-size: 30px;
    color: black;
}
.mejoras {
    position: fixed;
    top: 0;
    right: 0;
    width: 450px;
    height: 100%;
    background: linear-gradient(0deg, rgba(34,193,195,1) 0%, rgba(240,104,242,1) 52%, rgba(253,187,45,1) 100%);
    border-left: 1px solid #ccc;
    box-shadow: -1px 0 10px #000;
    padding: 15px;
    overflow-y: auto;
}
.mejora{
    background-color: rgba(225,222,222,0.25);
    width: 340px;
    height: 40px;
    margin-left: 15px;
    margin-top: 20px;
    border: 1px solid #ccc;
    box-shadow: 0 0 5px #000;
    text-align: left;
    padding-left: 10px;
    cursor: pointer;
}
.cantidad{
    background-color: rgba(225,222,222,0.25);
    width: 40px;
    height: 40px;
    margin-top: 20px;
    border: 1px solid #ccc;
    box-shadow: 0 0 5px #000;
    display:flex;
    justify-content:center;
    align-items:center;
}
.fila{
    display:flex;
}
#reiniciar, #ascender{
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 10px;
    cursor:pointer;
}
#ascender{ bottom:80px; }
</style>
</head>

<body>

<div class="info">
    <p id="PuntosPorClick">Puntos por click: 1</p>
    <p id="PuntosPorSegundo">Puntos por segundo: 0</p>
    <p id="PuntosTotales">Puntos totales: 0</p>
    <p id="Multiplicador">Multiplicador: 1x</p>
</div>

<div class="contenedor">
    <p id="Puntos">Puntos: 0</p>
    <button id="clicker" onclick="hacerClick()"></button>
</div>

<div class="mejoras" id="contenedorMejoras"></div>

<button id="reiniciar" onclick="reiniciar()">Reiniciar</button>
<button id="ascender" onclick="ascender()">Ascender</button>

<script>
let puntos=0,puntos_totales=0,puntos_por_click=1,puntos_por_segundo=0,multiplicador=1;
const TOTAL_INDICES=448;
const indices={};

function formatearNumero(num){
    const sufijos=["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc"];
    let i=0;
    while(num>=1000 && i<sufijos.length-1){num/=1000;i++;}
    return num.toFixed(2)+" "+sufijos[i];
}

function recargar(){
    Puntos.textContent="Puntos: "+formatearNumero(puntos);
    PuntosPorClick.textContent="Puntos por click: "+formatearNumero(puntos_por_click);
    PuntosPorSegundo.textContent="Puntos por segundo: "+formatearNumero(puntos_por_segundo);
    PuntosTotales.textContent="Puntos totales: "+formatearNumero(puntos_totales);
    Multiplicador.textContent="Multiplicador: "+multiplicador.toFixed(2)+"x";

    for(let i in indices){
        let el=document.getElementById("c"+i);
        if(el) el.textContent=indices[i];
    }
}

function hacerClick(){
    let g=Math.floor(puntos_por_click*multiplicador);
    puntos+=g; puntos_totales+=g;
    guardar(); recargar();
}

setInterval(()=>{
    let g=Math.floor(puntos_por_segundo*multiplicador);
    puntos+=g; puntos_totales+=g;
    guardar(); recargar();
},1000);

function comprar(tipo,ganancia,coste,id){
    if(puntos<coste)return;
    puntos-=coste;

    if(tipo==="click") puntos_por_click+=ganancia;
    else puntos_por_segundo+=ganancia;

    indices[id]=(indices[id]||0)+1;
    guardar(); recargar();
}

function generarMejoras(){
    let cont=document.getElementById("contenedorMejoras");

    for(let i=1;i<=TOTAL_INDICES;i++){
        let esClick=i%2;
        let nivel=Math.floor(i/2);

        let ganancia=Math.floor(Math.pow(1.7,nivel));
        let coste=Math.floor(50*Math.pow(2.15,nivel));

        indices[i]=0;

        let fila=document.createElement("div");
        fila.className="fila";

        let btn=document.createElement("button");
        btn.className="mejora";

        btn.textContent=`+${formatearNumero(ganancia)} ${esClick?"click":"/s"} (${formatearNumero(coste)})`;
        btn.onclick=()=>comprar(esClick?"click":"seg",ganancia,coste,i);

        let cant=document.createElement("div");
        cant.className="cantidad";
        cant.id="c"+i;
        cant.textContent=0;

        fila.appendChild(btn);
        fila.appendChild(cant);
        cont.appendChild(fila);
    }
}

function guardar(){
    localStorage.setItem("save",JSON.stringify({puntos,puntos_totales,puntos_por_click,puntos_por_segundo,multiplicador,indices}));
}

function cargar(){
    let s=localStorage.getItem("save");
    if(!s)return;
    let d=JSON.parse(s);
    Object.assign(window,d);
}

function reiniciar(){
    localStorage.clear();
    location.reload();
}

function ascender(){
    if(puntos_totales<10000000)return alert("No suficiente");
    multiplicador+=puntos_totales/10000000;
    puntos=0;puntos_totales=0;puntos_por_click=1;puntos_por_segundo=0;
    guardar();recargar();
}

generarMejoras();
cargar();
recargar();
</script>

</body>
</html>
