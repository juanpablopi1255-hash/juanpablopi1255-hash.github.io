<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clicker Pro</title>

<style>
body {
    background: linear-gradient(0deg, #22C1C3 0%, #f068f2 52%, #fdbb2d 100%);
    margin: 0;
    height: 100%;
    font-family: Arial;
}

.info {
    padding: 20px;
}

.dato {
    font-size: 18px;
}

.contenedor {
    margin-left: 30%;
    font-size: 30px;
}

#clicker {
    width: 200px;
    height: 200px;
    border-radius: 200px;
    background: #111;
    border: 2px solid #ccc;
    cursor: pointer;
}

#clicker:active {
    background: #333;
}

.mejoras {
    position: fixed;
    top: 0;
    right: 0;
    width: 420px;
    height: 100%;
    overflow-y: auto;
    padding: 10px;
    background: linear-gradient(0deg, #22C1C3, #f068f2, #fdbb2d);
}

.fila {
    display: flex;
    margin-top: 10px;
}

.mejora {
    width: 300px;
    cursor: pointer;
}

.cantidad {
    width: 50px;
    text-align: center;
}

button {
    padding: 8px;
}
</style>
</head>

<body>

<div class="info">
    <p id="PuntosPorClick">Puntos por click: 1</p>
    <p id="PuntosPorSegundo">Puntos por segundo: 0</p>
    <p id="PuntosTotales">Puntos totales: 0</p>
    <p id="Multiplicador">Multiplicador: 1x</p>
</div>

<div class="contenedor">
    <p id="Puntos">Puntos: 0</p>
    <button id="clicker" onclick="hacerClick()"></button>
</div>

<div class="mejoras" id="contenedorMejoras"></div>

<button onclick="reiniciar()">Reiniciar</button>
<button onclick="ascender()">Ascender</button>

<script>
let puntos = 0;
let puntos_totales = 0;
let puntos_por_click = 1;
let puntos_por_segundo = 0;
let multiplicador = 1;

const TOTAL_INDICES = 448;
const UMBRAL_PRESTIGIO = 10000000;

const indices = {};

function formatearNumero(num) {
    const sufijos = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc"];
    let i = 0;
    while (num >= 1000 && i < sufijos.length - 1) {
        num /= 1000;
        i++;
    }
    return num.toFixed(2) + " " + sufijos[i];
}

function recargar() {
    Puntos.textContent = "Puntos: " + formatearNumero(puntos);
    PuntosPorClick.textContent = "Puntos por click: " + formatearNumero(puntos_por_click);
    PuntosPorSegundo.textContent = "Puntos por segundo: " + formatearNumero(puntos_por_segundo);
    PuntosTotales.textContent = "Puntos totales: " + formatearNumero(puntos_totales);
    Multiplicador.textContent = "Multiplicador: " + multiplicador.toFixed(2) + "x";
}

function hacerClick() {
    let g = Math.floor(puntos_por_click * multiplicador);
    puntos += g;
    puntos_totales += g;
    guardar();
    recargar();
}

setInterval(() => {
    let g = Math.floor(puntos_por_segundo * multiplicador);
    puntos += g;
    puntos_totales += g;
    guardar();
    recargar();
}, 1000);

function sumarPuntosPorClick(p, c, i) {
    if (puntos >= c) {
        puntos -= c;
        puntos_por_click += p;
        indices[i]++;
        guardar();
        recargar();
    }
}

function sumarPuntosPorSegundo(p, c, i) {
    if (puntos >= c) {
        puntos -= c;
        puntos_por_segundo += p;
        indices[i]++;
        guardar();
        recargar();
    }
}

function generarMejoras() {
    let cont = document.getElementById("contenedorMejoras");

    for (let i = 1; i <= TOTAL_INDICES; i++) {
        let esClick = i % 2;
        let nivel = Math.floor(i / 2);

        let ganancia = Math.floor(Math.pow(1.7, nivel));
        let coste = Math.floor(50 * Math.pow(2.15, nivel));

        indices["i"+i] = 0;

        let fila = document.createElement("div");
        fila.className = "fila";

        let btn = document.createElement("button");
        btn.className = "mejora";

        if (esClick) {
            btn.textContent = "+"+formatearNumero(ganancia)+" click ("+formatearNumero(coste)+")";
            btn.onclick = () => sumarPuntosPorClick(ganancia, coste, "i"+i);
        } else {
            btn.textContent = "+"+formatearNumero(ganancia)+" /s ("+formatearNumero(coste)+")";
            btn.onclick = () => sumarPuntosPorSegundo(ganancia, coste, "i"+i);
        }

        let cant = document.createElement("div");
        cant.className = "cantidad";
        cant.id = "c"+i;
        cant.textContent = 0;

        fila.appendChild(btn);
        fila.appendChild(cant);
        cont.appendChild(fila);
    }
}

function guardar() {
    localStorage.setItem("save", JSON.stringify({
        puntos, puntos_totales, puntos_por_click, puntos_por_segundo, multiplicador, indices
    }));
}

function cargar() {
    let s = localStorage.getItem("save");
    if (!s) return;
    let data = JSON.parse(s);

    puntos = data.puntos;
    puntos_totales = data.puntos_totales;
    puntos_por_click = data.puntos_por_click;
    puntos_por_segundo = data.puntos_por_segundo;
    multiplicador = data.multiplicador;
    Object.assign(indices, data.indices);
}

function reiniciar() {
    localStorage.clear();
    location.reload();
}

function ascender() {
    if (puntos_totales < UMBRAL_PRESTIGIO) return alert("No suficiente");

    let bonus = puntos_totales / UMBRAL_PRESTIGIO;
    multiplicador += bonus;

    puntos = 0;
    puntos_totales = 0;
    puntos_por_click = 1;
    puntos_por_segundo = 0;

    guardar();
    recargar();
}

generarMejoras();
cargar();
recargar();
</script>

</body>
</html>
